.card{

  border-radius:12px;

img{

}

.copy-btn{
  position:absolute;
  right:10px;
  top:10px;
  background:#00e5ff;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.load{

  padding:10px;
  margin:20px 0;
  background:#2563eb;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* =========================

for(let i=1;i<=19;i++){
  let t = templates[i % templates.length];
  data.push(t);
}

/* =========================
   📦 RENDER FUNCTION
   ========================= */
function render(count){
  let list = document.getElementById("list");

  for(let i=shown;i<shown+count && i<data.length;i++){
    let div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <button class="copy-btn" onclick="copyText(${i})">Copy</button>

      <img src="${data[i].img}" onerror="this.style.display='none'">
    `;

    list.appendChild(div);
  }

  shown += count;
}

/* =========================
   📥 LOAD MORE
   ========================= */
function loadMore(){
  render(10);
}

/* =========================
   📋 COPY HIDDEN CODE
   ========================= */
function copyText(i){
  navigator.clipboard.writeText(data[i].code);

}
